<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gekko Browser - Workspaces</title>
  <link rel="icon" type="image/png" sizes="32x32" href="gkp://assets.gekko/icons/32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="gkp://assets.gekko/icons/16x16.png" />
  <link rel="stylesheet" href="gkp://shared.gekko/theme-vars.css" />
  <link rel="stylesheet" href="gkp://shared.gekko/styles.css" />
  <link rel="stylesheet" href="gkp://shared.gekko/button-styles.css" />
  <link rel="stylesheet" href="gkp://shared.gekko/fontawesome/all.min.css" />
  <link rel="stylesheet" href="styles.css" />
  <script src="gkp://shared.gekko/theme-utils.js"></script>
</head>
<body>
  <div class="internal-page">
    <div class="internal-page-header">
      <h1 class="internal-page-title">Workspaces</h1>
      <p class="internal-page-subtitle">Save sets of tabs and reopen them later</p>
    </div>

    <div class="internal-page-content">
      <div class="workspaces-controls">
        <div class="workspaces-search">
          <i class="fa-solid fa-magnifying-glass workspaces-search-icon"></i>
          <input
            type="text"
            class="workspaces-search-input"
            id="workspaces-search"
            placeholder="Search workspaces"
          >
        </div>
        <div class="workspaces-actions">
          <button class="button button-danger" id="clear-workspaces-btn">
            <i class="fa-solid fa-trash-can"></i>
            Clear Workspaces
          </button>
        </div>
      </div>

      <div id="workspaces-empty" class="empty-state hidden">
        <i class="fa-solid fa-folder-open fa-3x"></i>
        <p>No workspaces yet</p>
        <p class="text-secondary">Use the tab menu to save your current tabs as a workspace.</p>
      </div>

      <ul class="workspaces-list" id="workspaces-list"></ul>
    </div>
  </div>
  <script src="workspaces.js"></script>
</body>
</html>
